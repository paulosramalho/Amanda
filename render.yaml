services:
  - type: web
    name: amanda-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run start
    # Migrations Prisma NÃO rodam no build (deu problema na primeira tentativa).
    # Aplicar manualmente via Neon SQL Editor para cada nova migration:
    # 1. Copiar conteúdo de backend/prisma/migrations/{ts}_{nome}/migration.sql
    # 2. Colar no SQL Editor e executar
    # 3. INSERT na tabela "_prisma_migrations" com o migration_name para registrar
    # Ver docs/SETUP_INTEGRACOES.md → seção "Aplicação manual de migrations"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: INSTAGRAM_ENABLED
        value: false
      - key: INSTAGRAM_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_USER_ID
        value: "17841401371420027"
      - key: INSTAGRAM_SCHEDULER_ENABLED
        value: true
      - key: INSTAGRAM_RUN_UTC_HOUR
        value: "4"
      - key: INSTAGRAM_NOTIFY_EMAILS
        value: "amandaramalhoadv@gmail.com"
      - key: INSTAGRAM_TOKEN_ISSUED_DATE
        value: "2026-04-24"
      - key: IG_PUBLISH_ENABLED
        value: false
      - key: SITE_SECRET
        sync: false
      - key: ADMIN_ALERT_EMAILS
        value: "paulosramalho@gmail.com,amandaramalhoadv@gmail.com"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        value: "8746739304"
      # Cloudflare R2 — upload de mídia (Fase 3)
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        value: "amanda-instagram-media"
      - key: R2_PUBLIC_URL_BASE
        sync: false
