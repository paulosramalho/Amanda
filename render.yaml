services:
  - type: web
    name: amanda-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: INSTAGRAM_ENABLED
        value: false
      - key: INSTAGRAM_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_USER_ID
        value: "17841401371420027"
      - key: INSTAGRAM_SCHEDULER_ENABLED
        value: true
      - key: INSTAGRAM_RUN_UTC_HOUR
        value: "4"
      - key: INSTAGRAM_NOTIFY_EMAILS
        value: "amandaramalhoadv@gmail.com"
      - key: INSTAGRAM_TOKEN_ISSUED_DATE
        value: "2026-04-19"
